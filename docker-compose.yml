version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: apap_postgres
    environment:
      POSTGRES_USER: apap_user
      POSTGRES_PASSWORD: apap_pass
      POSTGRES_DB: apap_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: apap_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: